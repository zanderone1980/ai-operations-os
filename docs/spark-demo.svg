  <text x="600" y="148" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="11">active tokens</text>
  <!-- Edge count -->
  <text x="700" y="148" fill="#a8cc8c" font-family="system-ui,sans-serif" font-size="28" font-weight="700">8</text>
  <text x="720" y="148" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="11">edges</text>

  <!-- Spiral stats -->
  <text x="580" y="176" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Strongest token:</text>
  <text x="690" y="176" fill="#ffbd2e" font-family="monospace" font-size="10" font-weight="600">0.647 (4 spirals)</text>

  <text x="580" y="196" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Reinforcement rate:</text>
  <text x="700" y="196" fill="#a8cc8c" font-family="monospace" font-size="10" font-weight="600">0.15</text>

  <text x="580" y="216" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Compression tiers:</text>
  <text x="700" y="216" fill="#66c2cd" font-family="monospace" font-size="10" font-weight="600">raw → archival</text>

  <text x="580" y="236" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Passive decay:</text>
  <text x="700" y="236" fill="#e88388" font-family="monospace" font-size="10" font-weight="600">0.02/day</text>

