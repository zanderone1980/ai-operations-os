  <text x="580" y="104" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Spiral Memory</text>
  <text x="580" y="120" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="9">ESSENCE-BASED COMPRESSION</text>

