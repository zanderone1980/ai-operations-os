name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci
      - run: npx turbo build

  api-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx turbo build

      - name: Start API server
        run: node apps/ops-api/dist/server.js &
        env:
          OPS_PORT: '3100'

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3100/health && exit 0
            sleep 1
          done
          echo "Server failed to start" && exit 1

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:3100/health | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);console.log(j.status)})")
          [ "$STATUS" = "ok" ] || exit 1

      - name: Create task
        run: |
          curl -sf -X POST http://localhost:3100/api/tasks \
            -H 'Content-Type: application/json' \
            -d '{"source":"email","title":"CI test task","body":"Automated CI check"}' \
            | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);if(!j.id)process.exit(1)})"

      - name: Pipeline simulation
        run: |
          curl -sf -X POST http://localhost:3100/api/pipeline/simulate \
            -H 'Content-Type: application/json' \
            -d '{"source":"email","title":"Reply to customer","body":"shipping inquiry"}' \
            | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);if(j.intent!=='reply')process.exit(1)})"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx turbo build
