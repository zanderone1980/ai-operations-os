<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#161822"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2030"/>
      <stop offset="100%" style="stop-color:#1a1c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c5cff"/>
      <stop offset="100%" style="stop-color:#9b7aff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" rx="8" fill="url(#bg)"/>

  <!-- Window chrome -->
  <circle cx="24" cy="18" r="6" fill="#ff5f58"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="18" r="6" fill="#18c132"/>
  <text x="430" y="22" text-anchor="middle" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="12" font-weight="500">AI Operations OS — SPARK Chat</text>

  <!-- Header bar -->
  <rect x="0" y="36" width="860" height="32" fill="#161822"/>
  <text x="20" y="56" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">SPARK</text>
  <text x="65" y="56" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="11">Self-Perpetuating Adaptive Reasoning Kernel</text>
  <rect x="750" y="42" width="90" height="22" rx="4" fill="url(#accent)"/>
  <text x="795" y="57" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="600">New Chat</text>

  <!-- Chat area -->
  <rect x="20" y="80" width="520" height="400" rx="8" fill="url(#card)" stroke="#2a2d3e" stroke-width="1"/>

  <!-- User message 1 -->
  <rect x="330" y="95" width="190" height="30" rx="14" fill="url(#accent)"/>
  <text x="345" y="114" fill="white" font-family="system-ui,sans-serif" font-size="12">How are you doing?</text>
  <text x="512" y="114" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">YOU</text>

  <!-- SPARK response 1 -->
  <circle cx="46" cy="148" r="12" fill="#7c5cff"/>
  <text x="42" y="152" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">S</text>
  <rect x="64" y="135" width="450" height="50" rx="8" fill="#252740"/>
  <text x="76" y="152" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="11">I've processed 29 learning episodes across 1 connector.</text>
  <text x="76" y="168" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="11">Overall confidence: 63%. Building trust in: publication, general.</text>
  <text x="76" y="182" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="9">Show reasoning (1 step)</text>

  <!-- User message 2 -->
  <rect x="260" y="200" width="260" height="30" rx="14" fill="url(#accent)"/>
  <text x="275" y="219" fill="white" font-family="system-ui,sans-serif" font-size="12">What have you learned recently?</text>
  <text x="512" y="219" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">YOU</text>

  <!-- SPARK response 2 -->
  <circle cx="46" cy="253" r="12" fill="#7c5cff"/>
  <text x="42" y="257" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">S</text>
  <rect x="64" y="240" width="450" height="50" rx="8" fill="#252740"/>
  <text x="76" y="257" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="11">In my recent 20 episodes across 3 categories: Latest insight:</text>
  <text x="76" y="273" fill="#a8cc8c" font-family="system-ui,sans-serif" font-size="11">"general reached 10 episodes — initial patterns forming."</text>
  <text x="76" y="287" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="9">Show reasoning (1 step)</text>

  <!-- User message 3 -->
  <rect x="270" y="305" width="250" height="30" rx="14" fill="url(#accent)"/>
  <text x="285" y="324" fill="white" font-family="system-ui,sans-serif" font-size="12">What connections do you see?</text>
  <text x="512" y="324" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">YOU</text>

  <!-- SPARK response 3 -->
  <circle cx="46" cy="358" r="12" fill="#7c5cff"/>
  <text x="42" y="362" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">S</text>
  <rect x="64" y="345" width="450" height="40" rx="8" fill="#252740"/>
  <text x="76" y="362" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="11">I see activity across gmail. No cross-connector patterns yet —</text>
  <text x="76" y="378" fill="#c8cad8" font-family="system-ui,sans-serif" font-size="11">I need more data across multiple connectors to find connections.</text>

  <!-- Suggestion chips -->
  <rect x="64" y="400" width="160" height="24" rx="12" stroke="#3a3d52" stroke-width="1" fill="none"/>
  <text x="80" y="416" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">How are you doing overall?</text>
  <rect x="234" y="400" width="200" height="24" rx="12" stroke="#3a3d52" stroke-width="1" fill="none"/>
  <text x="250" y="416" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">What have you learned recently?</text>

  <!-- Input bar -->
  <rect x="34" y="435" width="480" height="32" rx="16" fill="#1a1c2e" stroke="#3a3d52" stroke-width="1"/>
  <text x="50" y="455" fill="#4a4d62" font-family="system-ui,sans-serif" font-size="11">Ask SPARK anything...</text>
  <circle cx="495" cy="451" r="12" fill="url(#accent)"/>
  <text x="495" y="455" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="12">&#x27A4;</text>

