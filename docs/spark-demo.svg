  <rect x="680" y="360" width="100" height="14" rx="3" fill="#252740"/>
  <rect x="680" y="360" width="100" height="14" rx="3" fill="#e88388" opacity="0.8"/>
  <text x="790" y="371" fill="#e88388" font-family="monospace" font-size="10">1.000</text>
  <rect x="753" y="360" width="50" height="14" rx="3" fill="#e88388" opacity="0.3"/>
  <text x="762" y="371" fill="#e88388" font-family="system-ui,sans-serif" font-size="8" font-weight="700">SENTINEL</text>

  <text x="580" y="394" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Financial</text>
  <rect x="680" y="384" width="100" height="14" rx="3" fill="#252740"/>
  <rect x="680" y="384" width="100" height="14" rx="3" fill="#e88388" opacity="0.8"/>
  <text x="790" y="395" fill="#e88388" font-family="monospace" font-size="10">1.000</text>
  <rect x="753" y="384" width="50" height="14" rx="3" fill="#e88388" opacity="0.3"/>
  <text x="762" y="395" fill="#e88388" font-family="system-ui,sans-serif" font-size="8" font-weight="700">SENTINEL</text>

  <text x="580" y="418" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">Scheduling</text>
  <rect x="680" y="408" width="100" height="14" rx="3" fill="#252740"/>
  <rect x="680" y="408" width="100" height="14" rx="3" fill="#7c5cff" opacity="0.8"/>
  <text x="790" y="419" fill="#c8cad8" font-family="monospace" font-size="10">1.000</text>

  <text x="580" y="442" fill="#8b8fa3" font-family="system-ui,sans-serif" font-size="10">General</text>
  <rect x="680" y="432" width="100" height="14" rx="3" fill="#252740"/>
  <rect x="680" y="432" width="100" height="14" rx="3" fill="#7c5cff" opacity="0.8"/>
  <text x="790" y="443" fill="#c8cad8" font-family="monospace" font-size="10">1.000</text>

  <text x="580" y="466" fill="#6b6f85" font-family="system-ui,sans-serif" font-size="9">29 episodes · 63% confidence · Protected</text>

  <!-- Footer -->
  <text x="430" y="510" text-anchor="middle" fill="#3a3d52" font-family="system-ui,sans-serif" font-size="10">Ascendral — AI Operations OS with SPARK Spiral Memory</text>
