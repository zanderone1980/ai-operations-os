  <rect x="680" y="336" width="100" height="14" rx="3" fill="#252740"/>
  <rect x="680" y="336" width="100" height="14" rx="3" fill="#7c5cff" opacity="0.8"/>
  <text x="790" y="347" fill="#c8cad8" font-family="monospace" font-size="10">1.000</text>

